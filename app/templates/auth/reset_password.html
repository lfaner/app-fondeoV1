{% extends "base_auth.html" %}
{% block title %}Nueva contraseña — CGB Fondeos{% endblock %}
{% block content %}
<div class="card auth-card">
  <div class="card-body p-4">
    <h5 class="card-title fw-bold mb-4">Nueva contraseña</h5>
    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      <div class="mb-3">
        <label class="form-label fw-medium">Nueva contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repetí la contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-check2 me-2"></i>Guardar contraseña
      </button>
    </form>
  </div>
</div>
{% endblock %}
