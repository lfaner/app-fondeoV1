{% extends "base_auth.html" %}
{% block title %}Iniciar Sesión — CGB Fondeos{% endblock %}
{% block content %}
<div class="card auth-card">
  <div class="card-body p-4">
    <h5 class="card-title fw-bold mb-4">Iniciar Sesión</h5>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label fw-medium">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>
  </div>
</div>
<p class="text-center text-white-50 mt-3 small">
  ¿No tenés cuenta?
  <a href="{{ url_for('auth.register') }}" class="text-white">Registrate</a>
</p>
{% endblock %}
