{% extends "base_auth.html" %}
{% block title %}Olvidé mi contraseña — CGB Fondeos{% endblock %}
{% block content %}
<div class="card auth-card">
  <div class="card-body p-4">
    <h5 class="card-title fw-bold mb-2">Restablecer contraseña</h5>
    <p class="text-muted small mb-4">
      Ingresá tu email y te enviamos un enlace para crear una nueva contraseña.
    </p>
    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div class="mb-4">
        <label class="form-label fw-medium">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="tu@email.com" required autofocus>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-send me-2"></i>Enviar enlace
      </button>
    </form>
  </div>
</div>
<p class="text-center text-white-50 mt-3 small">
  <a href="{{ url_for('auth.login') }}" class="text-white">Volver al login</a>
</p>
{% endblock %}
