{% extends "base_auth.html" %}
{% block title %}Registro — CGB Fondeos{% endblock %}
{% block content %}
<div class="card auth-card">
  <div class="card-body p-4">
    <h5 class="card-title fw-bold mb-4">Crear Cuenta</h5>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label fw-medium">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required autofocus>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Confirmar Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repetí la contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-person-plus me-2"></i>Registrarme
      </button>
    </form>
    <p class="text-muted small text-center mt-3 mb-0">
      Tu cuenta requiere aprobación del administrador.
    </p>
  </div>
</div>
<p class="text-center text-white-50 mt-3 small">
  ¿Ya tenés cuenta?
  <a href="{{ url_for('auth.login') }}" class="text-white">Ingresá</a>
</p>
{% endblock %}
