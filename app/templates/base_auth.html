<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CGB Fondeos{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f2340 0%, #1a3a5c 100%); min-height: 100vh; }
    .auth-card { border: none; border-radius: 1rem; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="w-100" style="max-width:420px;padding:1rem">
  <div class="text-center mb-4">
    <i class="bi bi-bank2 text-white" style="font-size:3rem"></i>
    <h2 class="text-white fw-bold mt-2">CGB Fondeos</h2>
    <p class="text-white-50">Capital Gain Bursatil</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'error' else 'warning' }} alert-dismissible fade show">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
